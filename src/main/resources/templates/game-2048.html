<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 - 经典数字游戏</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  user-select: none;
}
.game-wrapper { text-align: center; }
h1 { color: #fff; font-size: 2.5rem; text-shadow: 0 2px 8px rgba(0,0,0,.2); margin-bottom: 8px; }
.score-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
.score-box {
  background: rgba(255,255,255,.2); backdrop-filter: blur(8px);
  border-radius: 10px; padding: 10px 20px; color: #fff; min-width: 90px;
}
.score-box .label { font-size: .75rem; opacity: .8; text-transform: uppercase; }
.score-box .value { font-size: 1.4rem; font-weight: bold; }
.btn {
  background: rgba(255,255,255,.25); color: #fff; border: 2px solid rgba(255,255,255,.4);
  padding: 10px 24px; border-radius: 10px; cursor: pointer; font-size: 1rem;
  font-weight: 600; transition: all .2s; backdrop-filter: blur(4px);
}
.btn:hover { background: rgba(255,255,255,.4); transform: translateY(-1px); }
.grid-container {
  background: rgba(255,255,255,.15); backdrop-filter: blur(12px);
  border-radius: 16px; padding: 12px; display: inline-block;
  box-shadow: 0 8px 32px rgba(0,0,0,.15);
}
.grid { display: grid; grid-template-columns: repeat(4, 80px); grid-template-rows: repeat(4, 80px); gap: 8px; }
.cell {
  background: rgba(255,255,255,.2); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; font-weight: bold; transition: all .15s ease;
}
.cell[data-value="2"]    { background: #eee4da; color: #776e65; }
.cell[data-value="4"]    { background: #ede0c8; color: #776e65; }
.cell[data-value="8"]    { background: #f2b179; color: #fff; }
.cell[data-value="16"]   { background: #f59563; color: #fff; }
.cell[data-value="32"]   { background: #f67c5f; color: #fff; }
.cell[data-value="64"]   { background: #f65e3b; color: #fff; }
.cell[data-value="128"]  { background: #edcf72; color: #fff; font-size: 1.3rem; }
.cell[data-value="256"]  { background: #edcc61; color: #fff; font-size: 1.3rem; }
.cell[data-value="512"]  { background: #edc850; color: #fff; font-size: 1.3rem; }
.cell[data-value="1024"] { background: #edc53f; color: #fff; font-size: 1.1rem; }
.cell[data-value="2048"] { background: #edc22e; color: #fff; font-size: 1.1rem; }
.cell.new { animation: pop .2s ease; }
@keyframes pop { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
.info { color: rgba(255,255,255,.7); font-size: .85rem; margin-top: 16px; }
.win-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5);
  display: none; align-items: center; justify-content: center; z-index: 10;
}
.win-overlay.show { display: flex; }
.win-card {
  background: #fff; border-radius: 20px; padding: 40px; text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,.3); max-width: 360px;
}
.win-card h2 { font-size: 2rem; color: #333; margin-bottom: 8px; }
.win-card p { color: #666; margin-bottom: 20px; }
.win-card .btn { background: #667eea; border-color: #667eea; }
@media (max-width: 500px) {
  .grid { grid-template-columns: repeat(4, 60px); grid-template-rows: repeat(4, 60px); gap: 5px; }
  .cell { font-size: 1.1rem; border-radius: 8px; }
  .cell[data-value="128"], .cell[data-value="256"], .cell[data-value="512"] { font-size: 1rem; }
  .cell[data-value="1024"], .cell[data-value="2048"] { font-size: .85rem; }
  h1 { font-size: 1.8rem; }
}
</style>
</head>
<body>
<div class="game-wrapper">
  <h1>2048</h1>
  <div class="score-row">
    <div class="score-box"><div class="label">分数</div><div class="value" id="score">0</div></div>
    <div class="score-box"><div class="label">最高分</div><div class="value" id="best">0</div></div>
  </div>
  <div class="grid-container">
    <div class="grid" id="grid"></div>
  </div>
  <div class="info">方向键 / 滑动 控制 | <a href="#" onclick="newGame()" style="color:#fff;">🔄 重新开始</a></div>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-card">
    <h2>🎉 你赢了！</h2>
    <p>已达到 2048！得分：<b id="winScore">0</b></p>
    <button class="btn" onclick="keepGoing()">继续挑战</button>
    <button class="btn" onclick="newGame()" style="margin-left:8px;">重新开始</button>
  </div>
</div>

<script>
var board = [], score = 0, best = 0, gameWon = false, keepPlaying = false;
var gridEl = document.getElementById('grid'), scoreEl = document.getElementById('score');
var bestEl = document.getElementById('best'), winOverlay = document.getElementById('winOverlay');

// localStorage
try { best = parseInt(localStorage.getItem('2048-best')) || 0; } catch(e) {}
bestEl.textContent = best;

function initBoard() {
  board = Array(4).fill().map(() => Array(4).fill(0));
  score = 0; gameWon = false; keepPlaying = false;
  addRandom(); addRandom(); render();
}

function addRandom() {
  var empty = [];
  for(var r=0; r<4; r++) for(var c=0; c<4; c++) if(board[r][c]===0) empty.push({r,c});
  if(empty.length===0) return false;
  var pos = empty[Math.floor(Math.random()*empty.length)];
  board[pos.r][pos.c] = Math.random() < 0.9 ? 2 : 4;
  return true;
}

function render() {
  scoreEl.textContent = score;
  gridEl.innerHTML = '';
  for(var r=0; r<4; r++) {
    for(var c=0; c<4; c++) {
      var cell = document.createElement('div'); cell.className = 'cell';
      var val = board[r][c];
      if(val > 0) { cell.textContent = val; cell.setAttribute('data-value', val); }
      gridEl.appendChild(cell);
    }
  }
}

function slide(row) {
  var arr = row.filter(function(v) { return v !== 0; });
  for(var i=0; i<arr.length-1; i++) {
    if(arr[i] === arr[i+1]) { arr[i] *= 2; score += arr[i]; arr[i+1] = 0; }
  }
  arr = arr.filter(function(v) { return v !== 0; });
  while(arr.length < 4) arr.push(0);
  return arr;
}

function moveLeft()  { var moved=false; for(var r=0;r<4;r++){var old=board[r].slice();board[r]=slide(board[r]);if(old.join()!==board[r].join())moved=true;} return moved; }
function moveUp()    { rotateBoard(3); var m=moveLeft(); rotateBoard(1); return m; }
function moveDown()  { rotateBoard(1); var m=moveLeft(); rotateBoard(3); return m; }
function moveRight() { rotateBoard(2); var m=moveLeft(); rotateBoard(2); return m; }

function rotateBoard(times) {
  for(var t=0; t<times; t++) {
    var newB = Array(4).fill().map(()=>Array(4).fill(0));
    for(var r=0; r<4; r++) for(var c=0; c<4; c++) newB[c][3-r] = board[r][c];
    board = newB;
  }
}

function checkWin() {
  for(var r=0; r<4; r++) for(var c=0; c<4; c++) if(board[r][c]===2048) return true;
  return false;
}

function canMove() {
  for(var r=0; r<4; r++) for(var c=0; c<4; c++) {
    if(board[r][c]===0) return true;
    if(c<3 && board[r][c]===board[r][c+1]) return true;
    if(r<3 && board[r][c]===board[r+1][c]) return true;
  }
  return false;
}

function handleMove(moveFn) {
  var moved = moveFn();
  if(!moved) return;
  addRandom(); render();
  if(score > best) { best = score; bestEl.textContent = best; try { localStorage.setItem('2048-best', best); } catch(e) {} }
  if(!gameWon && !keepPlaying && checkWin()) { gameWon = true; winOverlay.classList.add('show'); document.getElementById('winScore').textContent = score; }
  if(!canMove()) { setTimeout(function(){ alert('游戏结束！得分: ' + score); }, 200); }
}

function keepGoing() { keepPlaying = true; winOverlay.classList.remove('show'); }
function newGame() { winOverlay.classList.remove('show'); initBoard(); }

// Keyboard
document.addEventListener('keydown', function(e) {
  e.preventDefault();
  if(e.key === 'ArrowLeft')  handleMove(moveLeft);
  if(e.key === 'ArrowUp')    handleMove(moveUp);
  if(e.key === 'ArrowDown')  handleMove(moveDown);
  if(e.key === 'ArrowRight') handleMove(moveRight);
});

// Touch
var touchStartX=0, touchStartY=0;
document.addEventListener('touchstart', function(e) { touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; }, {passive:true});
document.addEventListener('touchend', function(e) {
  var dx = e.changedTouches[0].clientX - touchStartX, dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx)<30 && Math.abs(dy)<30) return;
  if(Math.abs(dx) > Math.abs(dy)) { handleMove(dx > 0 ? moveRight : moveLeft); }
  else { handleMove(dy > 0 ? moveDown : moveUp); }
});

initBoard();
</script>
</body>
</html>
