<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tool.name} + ' - DevTools Station'">在线画图工具 - DevTools Station</title>
    <meta name="description" th:content="${tool.description}">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script>(function(){var t=localStorage.getItem('devtools-theme');if(t){document.documentElement.className='theme-'+t;}})()</script>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}

        .topbar{display:flex;align-items:center;gap:10px;padding:6px 14px;background:var(--bg-secondary,#1e1e2e);border-bottom:1px solid var(--border-color,#333);min-height:42px;z-index:100;flex-shrink:0}
        .topbar .brand{display:flex;align-items:center;gap:8px;margin-right:auto}
        .topbar .brand a{color:var(--accent,#7c3aed);text-decoration:none;font-size:18px;font-weight:bold}
        .topbar .brand .sep{color:var(--text-muted,#888);margin:0 4px}
        .topbar .brand .tool-name{color:var(--text-primary,#ddd);font-size:14px}
        .topbar button{padding:5px 12px;border:1px solid var(--border-color,#444);border-radius:6px;background:var(--bg-tertiary,#2a2a3a);color:var(--text-primary,#ddd);cursor:pointer;font-size:13px;transition:all .15s;white-space:nowrap}
        .topbar button:hover{background:var(--accent,#7c3aed);border-color:var(--accent,#7c3aed);color:#fff}
        .topbar .divider{width:1px;height:22px;background:var(--border-color,#444);margin:0 2px}

        #app{flex:1;overflow:hidden}

        .loading-overlay{position:fixed;inset:0;z-index:999;background:var(--bg-primary,#1a1a2e);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;transition:opacity .3s}
        .loading-overlay.hidden{opacity:0;pointer-events:none}
        .spinner{width:36px;height:36px;border:3px solid var(--border-color,#444);border-top-color:var(--accent,#7c3aed);border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .loading-overlay span{color:var(--text-muted,#999);font-size:14px}
        .loading-error{color:#ef4444;font-size:13px;text-align:center;max-width:400px;line-height:1.6;display:none}
        .loading-error.show{display:block}
        .loading-error code{background:var(--bg-tertiary,#2a2a3a);padding:2px 6px;border-radius:4px;font-size:12px}

        .hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:var(--bg-secondary,#1e1e2e);border:1px solid var(--border-color,#444);color:var(--text-muted,#999);padding:5px 16px;border-radius:20px;font-size:11px;z-index:100;pointer-events:none;opacity:0;transition:opacity .3s}
        .hint.show{opacity:1}
    </style>
</head>
<body>
    <div class="topbar">
        <div class="brand">
            <a href="/">🏠 DevTools</a>
            <span class="sep">/</span>
            <span class="tool-name" th:text="${tool.name}">画图工具</span>
        </div>
        <button id="btnClear" title="清空画布重新开始">🗑 清空</button>
        <span class="divider"></span>
        <button id="btnExportPng" title="导出为 PNG 图片">🖼 导出PNG</button>
        <button id="btnExportSvg" title="导出为 SVG 矢量图">📐 导出SVG</button>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <span id="loadingText">加载画图工具中…</span>
        <div class="loading-error" id="loadingError">
            ⚠️ CDN 加载超时<br>
            <small>可能网络受限，请刷新重试</small>
        </div>
    </div>

    <div id="app"></div>
    <div class="hint" id="hint"></div>

    <!-- Excalidraw 依赖: React + ReactDOM (jsdelivr 国内有 CDN 节点) -->
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@excalidraw/excalidraw@0.17.6/dist/excalidraw.production.min.js"></script>

    <script>
    (function() {
        var hint = document.getElementById('hint');
        var overlay = document.getElementById('loadingOverlay');
        var loadingText = document.getElementById('loadingText');
        var loadingError = document.getElementById('loadingError');
        var apiRef = null;
        var loadStart = Date.now();
        var LOAD_TIMEOUT = 15000;

        // CDN 加载超时检测
        var loadTimer = setTimeout(function() {
            loadingText.style.display = 'none';
            loadingError.classList.add('show');
        }, LOAD_TIMEOUT);

        function showHint(text) {
            hint.textContent = text;
            hint.classList.add('show');
            clearTimeout(hint._t);
            hint._t = setTimeout(function() { hint.classList.remove('show'); }, 2500);
        }

        function init() {
            if (typeof React === 'undefined' || typeof ReactDOM === 'undefined' || typeof Excalidraw === 'undefined') {
                if (Date.now() - loadStart < LOAD_TIMEOUT) {
                    setTimeout(init, 150);
                }
                return;
            }

            clearTimeout(loadTimer);
            overlay.classList.add('hidden');

            var ExcalidrawComponent = Excalidraw.default || Excalidraw;
            // 某些版本导出 .Excalidraw
            if (!ExcalidrawComponent && Excalidraw.Excalidraw) {
                ExcalidrawComponent = Excalidraw.Excalidraw;
            }

            if (!ExcalidrawComponent || typeof ExcalidrawComponent !== 'function') {
                showHint('❌ Excalidraw 组件加载失败，版本不兼容');
                return;
            }

            function App() {
                var excalidrawRef = React.useRef(null);

                React.useEffect(function() {
                    showHint('✅ 画图工具就绪！点左侧工具栏开始画图');
                    // 恢复自动保存
                    try {
                        var saved = localStorage.getItem('excalidraw-autosave');
                        if (saved && excalidrawRef.current) {
                            var data = JSON.parse(saved);
                            if (data.elements && data.elements.length > 0) {
                                try {
                                    apiRef.updateScene({ elements: data.elements, appState: data.appState || {} });
                                    showHint('📌 已恢复上次画布内容');
                                } catch(e) {}
                            }
                        }
                    } catch(e) {}

                    // 每 10 秒自动保存
                    var autoSave = setInterval(function() {
                        try {
                            if (apiRef) {
                                var el = apiRef.getSceneElements();
                                var st = apiRef.getAppState();
                                localStorage.setItem('excalidraw-autosave', JSON.stringify({ elements: el, appState: st }));
                            }
                        } catch(e) {}
                    }, 10000);

                    return function() { clearInterval(autoSave); };
                }, []);

                return React.createElement(ExcalidrawComponent, {
                    ref: excalidrawRef,
                    excalidrawAPI: function(api) {
                        apiRef = api;
                        if (api && api.getSceneElements) {
                            // API ready
                        }
                    },
                    initialData: {
                        appState: {
                            viewBackgroundColor: '#ffffff',
                            zenModeEnabled: false,
                            gridModeEnabled: true
                        }
                    }
                });
            }

            try {
                var root = ReactDOM.createRoot(document.getElementById('app'));
                root.render(React.createElement(App));
            } catch(e) {
                showHint('❌ 初始化失败: ' + e.message);
                console.error(e);
            }

            // 按钮绑定
            document.getElementById('btnExportPng').onclick = function() { doExport('png'); };
            document.getElementById('btnExportSvg').onclick = function() { doExport('svg'); };
            document.getElementById('btnClear').onclick = function() {
                if (confirm('确定要清空画布吗？此操作不可恢复。')) {
                    if (apiRef) {
                        try {
                            apiRef.updateScene({ elements: [], appState: apiRef.getAppState() });
                            localStorage.removeItem('excalidraw-autosave');
                            showHint('🗑 画布已清空');
                        } catch(e) {
                            showHint('❌ 清空失败，请刷新页面');
                        }
                    }
                }
            };

            // 快捷键
            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'S') {
                    e.preventDefault();
                    doExport('svg');
                } else if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    doExport('png');
                }
            });
        }

        function doExport(format) {
            if (!apiRef) {
                showHint('⚠️ 工具尚未就绪，请稍等');
                return;
            }
            try {
                var elements = apiRef.getSceneElements();
                if (!elements || elements.length === 0) {
                    showHint('⚠️ 画布为空，请先用左侧工具画点东西');
                    return;
                }
                showHint('⏳ 正在导出 ' + format.toUpperCase() + '…');
                apiRef.exportToBlob({
                    elements: elements,
                    appState: apiRef.getAppState(),
                    files: apiRef.getFiles ? apiRef.getFiles() : null,
                    mimeType: format === 'png' ? 'image/png' : 'image/svg+xml'
                }).then(function(blob) {
                    var url = URL.createObjectURL(blob);
                    var a = document.createElement('a');
                    a.href = url;
                    a.download = 'drawing.' + format;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    showHint('✅ 已下载: drawing.' + format);
                }).catch(function(err) {
                    showHint('❌ 导出失败: ' + (err.message || '未知错误'));
                });
            } catch(e) {
                showHint('❌ 导出失败，请稍后重试');
            }
        }

        // 启动
        init();
    })();
    </script>
</body>
</html>
