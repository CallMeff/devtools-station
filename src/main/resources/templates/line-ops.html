<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tool.name} + ' - DevTools Station'">文本行操作工具 - DevTools Station</title>
    <meta name="description" th:content="${tool.description}">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script>(function(){var t=localStorage.getItem('devtools-theme');if(t){document.documentElement.className='theme-'+t;}})()</script>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg-primary,#1a1a2e);color:var(--text-primary,#ddd);min-height:100vh;display:flex;flex-direction:column}
        .topbar{display:flex;align-items:center;gap:10px;padding:6px 14px;background:var(--bg-secondary,#1e1e2e);border-bottom:1px solid var(--border-color,#333);min-height:42px;flex-shrink:0}
        .topbar .brand{display:flex;align-items:center;gap:8px;margin-right:auto}
        .topbar .brand a{color:var(--accent,#7c3aed);text-decoration:none;font-size:18px;font-weight:bold}
        .topbar .brand .sep{color:var(--text-muted,#888);margin:0 4px}
        .topbar .brand .tool-name{color:var(--text-primary,#ddd);font-size:14px}
        .topbar button{padding:5px 12px;border:1px solid var(--border-color,#444);border-radius:6px;background:var(--bg-tertiary,#2a2a3a);color:var(--text-primary,#ddd);cursor:pointer;font-size:13px;transition:all .15s}
        .topbar button:hover{background:var(--accent,#7c3aed);border-color:var(--accent,#7c3aed);color:#fff}

        .main-container{display:flex;flex:1;overflow:hidden;gap:0}
        .input-section{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--border-color,#333)}
        .output-section{flex:1;display:flex;flex-direction:column;min-width:0}
        .section-header{padding:10px 16px;background:var(--bg-secondary,#1e1e2e);border-bottom:1px solid var(--border-color,#333);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
        .section-header h3{font-size:13px;font-weight:600;color:var(--text-muted,#888)}
        .section-header .line-count{font-size:11px;color:var(--text-muted,#666);background:var(--bg-tertiary,#2a2a3a);padding:2px 8px;border-radius:10px}

        .input-area,.output-area{flex:1;position:relative}
        .input-area textarea,.output-area textarea{position:absolute;inset:0;width:100%;height:100%;background:transparent;border:none;color:var(--text-primary,#ddd);font-family:'SF Mono','JetBrains Mono','Consolas',monospace;font-size:13px;line-height:1.6;padding:16px;resize:none;outline:none;tab-size:4}
        .input-area textarea::placeholder{color:var(--text-muted,#666)}

        .toolbar{display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--bg-secondary,#1e1e2e);border-top:1px solid var(--border-color,#333);flex-wrap:wrap;flex-shrink:0}
        .toolbar .divider{width:1px;height:22px;background:var(--border-color,#444);margin:0 4px}
        .toolbar button{padding:6px 14px;border:1px solid var(--border-color,#444);border-radius:6px;background:var(--bg-tertiary,#2a2a3a);color:var(--text-primary,#ddd);cursor:pointer;font-size:12px;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
        .toolbar button:hover{background:var(--accent,#7c3aed);border-color:var(--accent,#7c3aed);color:#fff}
        .toolbar button.accent{background:var(--accent,#7c3aed);border-color:var(--accent,#7c3aed);color:#fff}
        .toolbar button.danger:hover{background:#e53e3e;border-color:#e53e3e}
        .toolbar input[type="text"]{padding:5px 10px;border:1px solid var(--border-color,#444);border-radius:6px;background:var(--bg-tertiary,#2a2a3a);color:var(--text-primary,#ddd);font-size:12px;width:100px;outline:none}
        .toolbar input[type="text"]:focus{border-color:var(--accent,#7c3aed)}
        .toolbar input[type="number"]{padding:5px 8px;border:1px solid var(--border-color,#444);border-radius:6px;background:var(--bg-tertiary,#2a2a3a);color:var(--text-primary,#ddd);font-size:12px;width:60px;outline:none}
        .toolbar select{padding:5px 8px;border:1px solid var(--border-color,#444);border-radius:6px;background:var(--bg-tertiary,#2a2a3a);color:var(--text-primary,#ddd);font-size:12px;outline:none;cursor:pointer}
        .toolbar label{font-size:11px;color:var(--text-muted,#888);white-space:nowrap}

        .toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:var(--bg-secondary,#1e1e2e);border:1px solid var(--border-color,#444);color:var(--text-primary,#ddd);padding:10px 24px;border-radius:24px;font-size:13px;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
        .toast.show{opacity:1}

        @media (max-width:768px){
            .main-container{flex-direction:column}
            .input-section{border-right:none;border-bottom:1px solid var(--border-color,#333)}
            .toolbar button{font-size:11px;padding:5px 10px}
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="brand">
            <a href="/">🏠 DevTools</a>
            <span class="sep">/</span>
            <span class="tool-name" th:text="${tool.name}">文本行操作</span>
        </div>
        <button onclick="clearAll()" title="清空输入和输出">🗑 清空</button>
        <button onclick="swapIO()" title="交换输入和输出">↔️ 交换</button>
    </div>

    <div class="main-container">
        <div class="input-section">
            <div class="section-header">
                <h3>📥 输入文本</h3>
                <span class="line-count" id="inputLineCount">0 行</span>
            </div>
            <div class="input-area">
                <textarea id="inputText" placeholder="在此粘贴多行文本，每行一行...&#10;&#10;示例：&#10;apple&#10;banana&#10;cherry&#10;apple&#10;date&#10;banana" oninput="updateLineCount()"></textarea>
            </div>
        </div>
        <div class="output-section">
            <div class="section-header">
                <h3>📤 输出结果</h3>
                <span class="line-count" id="outputLineCount">0 行</span>
            </div>
            <div class="output-area">
                <textarea id="outputText" readonly placeholder="选择下方操作按钮处理文本..."></textarea>
            </div>
        </div>
    </div>

    <div class="toolbar">
        <!-- 排序 -->
        <button onclick="doSort('asc')" title="按字母升序排列">🔤 A→Z 排序</button>
        <button onclick="doSort('desc')" title="按字母降序排列">🔤 Z→A 排序</button>
        <button onclick="doSort('random')" title="随机打乱顺序">🎲 随机排序</button>
        <button onclick="doSort('reverse')" title="反转行顺序">🔄 反转</button>
        <div class="divider"></div>
        <!-- 去重 -->
        <button onclick="doDedupe()" title="去除完全重复的行">✅ 去重</button>
        <button onclick="doDedupePreserveOrder()" title="去重但保留首次出现顺序">📋 去重(保持顺序)</button>
        <div class="divider"></div>
        <!-- 编号 -->
        <button onclick="doNumberLines()" title="在每行前面添加序号">🔢 编号</button>
        <div class="divider"></div>
        <!-- 前后缀 -->
        <button onclick="doTrim()" title="去除每行首尾空白">✂️ 修剪空白</button>
        <label>前缀:</label>
        <input type="text" id="prefixInput" placeholder="如: - " onkeydown="if(event.key==='Enter')doPrefix()">
        <button onclick="doPrefix()">+前缀</button>
        <label>后缀:</label>
        <input type="text" id="suffixInput" placeholder="如: ;" onkeydown="if(event.key==='Enter')doSuffix()">
        <button onclick="doSuffix()">+后缀</button>
        <div class="divider"></div>
        <!-- 复制 -->
        <button class="accent" onclick="copyOutput()">📋 复制结果</button>
        <button onclick="downloadOutput()">💾 下载为 TXT</button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    (function(){
        var inputText = document.getElementById('inputText');
        var outputText = document.getElementById('outputText');
        var toast = document.getElementById('toast');
        var prefixInput = document.getElementById('prefixInput');
        var suffixInput = document.getElementById('suffixInput');

        var toastTimer;
        window.showToast = function(msg){
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(function(){ toast.classList.remove('show'); }, 1500);
        };

        window.updateLineCount = function(){
            var lines = inputText.value.split('\n');
            document.getElementById('inputLineCount').textContent = lines.length + ' 行';
            var outLines = outputText.value ? outputText.value.split('\n').length : 0;
            document.getElementById('outputLineCount').textContent = outLines + ' 行';
        };

        window.clearAll = function(){
            inputText.value = '';
            outputText.value = '';
            updateLineCount();
            showToast('已清空');
        };

        window.swapIO = function(){
            var tmp = inputText.value;
            inputText.value = outputText.value;
            outputText.value = tmp;
            updateLineCount();
            showToast('已交换');
        };

        function getLines(){
            return inputText.value.split('\n');
        }

        function setOutput(lines){
            outputText.value = lines.join('\n');
            updateLineCount();
        }

        window.doSort = function(mode){
            var lines = getLines();
            if(mode === 'asc') lines.sort(function(a,b){ return a.localeCompare(b); });
            else if(mode === 'desc') lines.sort(function(a,b){ return b.localeCompare(a); });
            else if(mode === 'random') { for(var i=lines.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1));var t=lines[i];lines[i]=lines[j];lines[j]=t; } }
            else if(mode === 'reverse') lines.reverse();
            setOutput(lines);
            showToast('排序完成 (' + lines.length + ' 行)');
        };

        window.doDedupe = function(){
            var lines = getLines();
            var seen = {}, result = [];
            for(var i=0;i<lines.length;i++){
                if(!seen[lines[i]]){ seen[lines[i]]=true; result.push(lines[i]); }
            }
            setOutput(result);
            showToast('去重完成: ' + lines.length + ' → ' + result.length + ' 行');
        };

        window.doDedupePreserveOrder = function(){
            window.doDedupe();
        };

        window.doNumberLines = function(){
            var lines = getLines();
            var pad = String(lines.length).length;
            var result = lines.map(function(line, i){
                return String(i+1).padStart(pad, '0') + '. ' + line;
            });
            setOutput(result);
            showToast('已添加编号');
        };

        window.doTrim = function(){
            var lines = getLines().map(function(l){ return l.trim(); });
            setOutput(lines);
            showToast('已修剪空白');
        };

        window.doPrefix = function(){
            var prefix = prefixInput.value;
            var lines = getLines().map(function(l){ return prefix + l; });
            setOutput(lines);
            showToast('已添加前缀');
        };

        window.doSuffix = function(){
            var suffix = suffixInput.value;
            var lines = getLines().map(function(l){ return l + suffix; });
            setOutput(lines);
            showToast('已添加后缀');
        };

        window.copyOutput = function(){
            if(!outputText.value){ showToast('没有可复制的内容'); return; }
            if(navigator.clipboard){
                navigator.clipboard.writeText(outputText.value).then(function(){
                    showToast('✓ 已复制到剪贴板');
                });
            } else {
                outputText.select();
                document.execCommand('copy');
                showToast('✓ 已复制到剪贴板');
            }
        };

        window.downloadOutput = function(){
            if(!outputText.value){ showToast('没有可下载的内容'); return; }
            var blob = new Blob([outputText.value], {type:'text/plain;charset=utf-8'});
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url; a.download = 'output.txt';
            a.click(); URL.revokeObjectURL(url);
            showToast('已下载');
        };

        // 快捷键
        document.addEventListener('keydown', function(e){
            if((e.ctrlKey||e.metaKey) && e.key === 'Enter'){ e.preventDefault(); copyOutput(); }
        });

        // 从 localStorage 恢复
        var saved = localStorage.getItem('line-ops-input');
        if(saved){ inputText.value = saved; updateLineCount(); }
        inputText.addEventListener('input', function(){
            localStorage.setItem('line-ops-input', inputText.value);
            updateLineCount();
        });
    })();
    </script>
</body>
</html>
