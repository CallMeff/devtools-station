<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - DevTools Station</title>
    <!-- 防闪烁：在 CSS 加载前立即应用保存的主题 -->
    <script>(function(){var t=localStorage.getItem('devtools-theme');if(t){document.documentElement.className='theme-'+t;}})()</script>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/themes.css">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .e404 { text-align:center; }
        .e404-code { font-size:96px; font-weight:800; background:linear-gradient(135deg,#6366f1,#8b5cf6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .e404-title { margin:16px 0; color:var(--text-primary); font-size:24px; }
        .e404-desc { color:var(--text-secondary); margin-bottom:24px; }
    </style>
</head>
<body class="theme-dark">
    <div class="e404">
        <div class="e404-code">404</div>
        <h2 class="e404-title">页面不存在</h2>
        <p class="e404-desc">你找的工具或页面不存在哦~</p>
        <a href="/" class="btn-primary" style="display:inline-flex;align-items:center;gap:8px;">🏠 返回首页</a>
    </div>
    <script src="/js/theme.js"></script>
</body>
</html>
