<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tool.name} + ' - DevTools Station'">配色方案生成器 - DevTools Station</title>
    <meta name="description" th:content="${tool.description}">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script>(function(){var t=localStorage.getItem('devtools-theme');if(t){document.documentElement.className='theme-'+t;}})()</script>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg-primary,#1a1a2e);color:var(--text-primary,#ddd);min-height:100vh;display:flex;flex-direction:column}
        .topbar{display:flex;align-items:center;gap:10px;padding:6px 14px;background:var(--bg-secondary,#1e1e2e);border-bottom:1px solid var(--border-color,#333);min-height:42px;flex-shrink:0}
        .topbar .brand{display:flex;align-items:center;gap:8px;margin-right:auto}
        .topbar .brand a{color:var(--accent,#7c3aed);text-decoration:none;font-size:18px;font-weight:bold}
        .topbar .brand .sep{color:var(--text-muted,#888);margin:0 4px}
        .topbar .brand .tool-name{color:var(--text-primary,#ddd);font-size:14px}
        .topbar button{padding:5px 12px;border:1px solid var(--border-color,#444);border-radius:6px;background:var(--bg-tertiary,#2a2a3a);color:var(--text-primary,#ddd);cursor:pointer;font-size:13px;transition:all .15s;display:flex;align-items:center;gap:5px}
        .topbar button:hover{background:var(--accent,#7c3aed);border-color:var(--accent,#7c3aed);color:#fff}
        .topbar .divider{width:1px;height:22px;background:var(--border-color,#444);margin:0 2px}

        .palette-container{flex:1;display:flex;overflow:hidden}
        .color-strip{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:transform .2s;min-width:0}
        .color-strip:hover{transform:scaleY(1.02);z-index:1}
        .color-strip .lock{position:absolute;top:16px;font-size:20px;opacity:.4;transition:opacity .2s}
        .color-strip .lock:hover{opacity:1}
        .color-strip .lock.active{opacity:1}

        .color-info{text-align:center;padding:16px 8px;background:rgba(0,0,0,.15);border-radius:12px;backdrop-filter:blur(8px)}
        .color-info .hex{font-size:18px;font-weight:bold;letter-spacing:1px;font-family:'SF Mono','JetBrains Mono',monospace;margin-bottom:4px}
        .color-info .name{font-size:11px;opacity:.7}
        .color-info .copy-hint{font-size:10px;opacity:.5;margin-top:4px}

        .controls-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 20px;background:var(--bg-secondary,#1e1e2e);border-top:1px solid var(--border-color,#333);flex-shrink:0;flex-wrap:wrap}
        .controls-bar button{padding:8px 18px;border:1px solid var(--border-color,#444);border-radius:8px;background:var(--bg-tertiary,#2a2a3a);color:var(--text-primary,#ddd);cursor:pointer;font-size:14px;transition:all .15s;display:flex;align-items:center;gap:6px}
        .controls-bar button:hover{background:var(--accent,#7c3aed);border-color:var(--accent,#7c3aed);color:#fff}
        .controls-bar .hint-text{color:var(--text-muted,#999);font-size:12px}
        .controls-bar .hint-text kbd{background:var(--bg-tertiary,#2a2a3a);padding:2px 6px;border-radius:4px;font-size:11px;border:1px solid var(--border-color,#444)}

        .saved-section{display:none;padding:16px 20px;background:var(--bg-secondary,#1e1e2e);border-top:1px solid var(--border-color,#333);flex-shrink:0}
        .saved-section.show{display:block}
        .saved-section h4{font-size:13px;color:var(--text-muted,#999);margin-bottom:10px}
        .saved-palettes{display:flex;gap:8px;flex-wrap:wrap}
        .saved-chip{display:flex;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;height:40px;transition:all .15s}
        .saved-chip:hover{border-color:var(--accent,#7c3aed);transform:translateY(-2px)}
        .saved-chip .swatch{width:40px;height:40px}

        .toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:var(--bg-secondary,#1e1e2e);border:1px solid var(--border-color,#444);color:var(--text-primary,#ddd);padding:8px 20px;border-radius:20px;font-size:13px;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
        .toast.show{opacity:1}

        @media (max-width:640px){
            .palette-container{flex-direction:column}
            .color-strip{flex-direction:row;min-height:60px}
            .color-info{display:flex;align-items:center;gap:12px;padding:8px 14px}
            .color-info .hex{font-size:15px;margin-bottom:0}
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="brand">
            <a href="/">🏠 DevTools</a>
            <span class="sep">/</span>
            <span class="tool-name" th:text="${tool.name}">配色方案</span>
        </div>
        <button id="btnSave" title="保存当前配色方案">💾 保存</button>
    </div>

    <div class="palette-container" id="paletteContainer"></div>

    <div class="controls-bar">
        <button id="btnGenerate">🎲 随机生成</button>
        <span class="hint-text">按 <kbd>空格键</kbd> 随机生成</span>
        <span class="divider" style="width:1px;height:22px;background:var(--border-color,#444)"></span>
        <span class="hint-text">点击色块复制颜色代码</span>
        <span class="hint-text">🔒 点击锁锁定颜色</span>
    </div>

    <div class="saved-section" id="savedSection">
        <h4>📌 已保存的配色方案</h4>
        <div class="saved-palettes" id="savedPalettes"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    (function(){
        var container = document.getElementById('paletteContainer');
        var savedSection = document.getElementById('savedSection');
        var savedPalettes = document.getElementById('savedPalettes');
        var toast = document.getElementById('toast');

        var colors = [];
        var locked = {};
        var COLOR_COUNT = 5;
        var savedList = [];

        var colorNames = {
            '#FF6B6B':'珊瑚红','#FF8E72':'蜜瓜橙','#FFA07A':'浅三文鱼','#FFD93D':'阳光黄',
            '#6BCB77':'薄荷绿','#4D96FF':'宝石蓝','#9B59B6':'紫罗兰','#FF6FB5':'粉红',
            '#C9B1FF':'薰衣草','#95E1D3':'蒂芙尼','#F38181':'玫瑰红','#AA96DA':'紫藤',
            '#FCBAD3':'樱花粉','#A8D8EA':'天空蓝','#FFE2E2':'浅粉','#BAD7DF':'雾蓝',
            '#FFE5B4':'杏色','#E8D5B7':'奶茶色','#C1E1C1':'鼠尾草','#D4A5A5':'豆沙',
            '#A3E4D7':'青瓷绿','#F9E79F':'奶油黄','#D7BDE2':'丁香紫','#A9DFBF':'抹茶',
            '#F5B7B1':'腮红','#AED6F1':'婴儿蓝','#FADBD8':'裸粉','#D5F5E3':'嫩绿'
        };

        function getName(hex){
            return colorNames[hex.toUpperCase()] || '';
        }

        function randomColor(saturation, lightness){
            var h = Math.floor(Math.random() * 360);
            var s = saturation || (40 + Math.random() * 40);
            var l = lightness || (35 + Math.random() * 30);
            return hslToHex(h, s, l);
        }

        function hslToHex(h, s, l){
            s /= 100; l /= 100;
            var a = s * Math.min(l, 1 - l);
            var f = function(n){
                var k = (n + h / 30) % 12;
                return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
            };
            return '#' + [f(0), f(8), f(4)].map(function(x){
                return Math.round(x * 255).toString(16).padStart(2, '0');
            }).join('');
        }

        function generateHarmonious(){
            var hue = Math.floor(Math.random() * 360);
            var schemes = ['analogous','complementary','triadic','monochromatic'];
            var scheme = schemes[Math.floor(Math.random() * schemes.length)];
            var result = [];

            switch(scheme){
                case 'analogous':
                    for (var i = 0; i < COLOR_COUNT; i++) {
                        var h = (hue + i * 20 - 40 + 360) % 360;
                        result.push(hslToHex(h, 50 + Math.random() * 20, 45 + Math.random() * 20));
                    }
                    break;
                case 'complementary':
                    result.push(hslToHex(hue, 55, 48));
                    result.push(hslToHex((hue + 180) % 360, 55, 48));
                    for (var i = 2; i < COLOR_COUNT; i++) {
                        result.push(hslToHex((hue + i * 60) % 360, 40 + Math.random() * 30, 50 + Math.random() * 20));
                    }
                    break;
                case 'triadic':
                    for (var i = 0; i < COLOR_COUNT; i++) {
                        result.push(hslToHex((hue + i * 120) % 360, 45 + Math.random() * 25, 40 + Math.random() * 25));
                    }
                    break;
                case 'monochromatic':
                    for (var i = 0; i < COLOR_COUNT; i++) {
                        result.push(hslToHex(hue, 30 + Math.random() * 20, 25 + i * 15));
                    }
                    break;
                default:
                    for (var i = 0; i < COLOR_COUNT; i++) result.push(randomColor());
            }
            return result;
        }

        function generate(){
            colors = generateHarmonious();
            // 保持锁定的颜色
            Object.keys(locked).forEach(function(idx){
                if (locked[idx] && idx < COLOR_COUNT) {
                    colors[parseInt(idx)] = locked[idx];
                }
            });
            render();
        }

        function render(){
            container.innerHTML = '';
            colors.forEach(function(color, i){
                var strip = document.createElement('div');
                strip.className = 'color-strip';
                strip.style.backgroundColor = color;
                var textColor = getLuminance(color) > 0.5 ? '#222' : '#fff';

                strip.innerHTML = 
                    '<div class="lock' + (locked[i] ? ' active' : '') + '" data-idx="' + i + '" style="color:' + textColor + '">' +
                    (locked[i] ? '🔒' : '🔓') + '</div>' +
                    '<div class="color-info" style="color:' + textColor + '">' +
                    '<div class="hex">' + color.toUpperCase() + '</div>' +
                    '<div class="name">' + (getName(color) || '') + '</div>' +
                    '<div class="copy-hint">点击复制</div>' +
                    '</div>';

                // 点击色块复制
                strip.addEventListener('click', function(e){
                    if (e.target.closest('.lock')) return; // 不处理锁点击
                    copyToClipboard(color.toUpperCase());
                    showToast('✅ 已复制 ' + color.toUpperCase());
                });

                container.appendChild(strip);
            });

            // 锁点击事件
            container.querySelectorAll('.lock').forEach(function(lock){
                lock.addEventListener('click', function(e){
                    e.stopPropagation();
                    var idx = this.dataset.idx;
                    if (locked[idx]) {
                        delete locked[idx];
                    } else {
                        locked[idx] = colors[idx];
                    }
                    render();
                });
            });
        }

        function getLuminance(hex){
            var r = parseInt(hex.slice(1,3), 16) / 255;
            var g = parseInt(hex.slice(3,5), 16) / 255;
            var b = parseInt(hex.slice(5,7), 16) / 255;
            return 0.2126 * r + 0.7152 * g + 0.0722 * b;
        }

        function copyToClipboard(text){
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
        }

        // 保存当前配色
        function savePalette(){
            var palette = colors.slice();
            savedList.push(palette);
            if (savedList.length > 20) savedList.shift();
            try { localStorage.setItem('saved-palettes', JSON.stringify(savedList)); } catch(e){}
            renderSaved();
            savedSection.classList.add('show');
            showToast('💾 配色方案已保存');
        }

        function renderSaved(){
            if (savedList.length === 0) {
                savedSection.classList.remove('show');
                return;
            }
            savedSection.classList.add('show');
            savedPalettes.innerHTML = '';
            savedList.slice().reverse().forEach(function(palette, pi){
                var chip = document.createElement('div');
                chip.className = 'saved-chip';
                chip.title = palette.join(', ');
                palette.forEach(function(c){
                    var sw = document.createElement('div');
                    sw.className = 'swatch';
                    sw.style.backgroundColor = c;
                    chip.appendChild(sw);
                });
                chip.addEventListener('click', function(){
                    colors = palette.slice();
                    locked = {};
                    render();
                    showToast('📌 已加载保存的配色');
                });
                savedPalettes.appendChild(chip);
            });
        }

        function showToast(msg){
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._t);
            toast._t = setTimeout(function(){ toast.classList.remove('show'); }, 2000);
        }

        // 键盘快捷键
        document.addEventListener('keydown', function(e){
            if (e.code === 'Space' && e.target === document.body) {
                e.preventDefault();
                generate();
            }
        });

        document.getElementById('btnGenerate').addEventListener('click', generate);
        document.getElementById('btnSave').addEventListener('click', savePalette);

        // 恢复保存的配色
        try {
            var saved = localStorage.getItem('saved-palettes');
            if (saved) { savedList = JSON.parse(saved); renderSaved(); }
        } catch(e){}

        // 初始生成
        generate();
    })();
    </script>
</body>
</html>
