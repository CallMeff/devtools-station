<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache">
    <title th:text="${tool.name} + ' - DevTools Station'">在线代码编辑器 - DevTools Station</title>
    <meta name="description" th:content="${tool.description}">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script>(function(){var t=localStorage.getItem('devtools-theme');if(t){document.documentElement.className='theme-'+t;}})()</script>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/themes.css">
    <script src="/js/i18n.js" defer></script>
    <script src="/js/auth.js" defer></script>
    <style>
        .ce-app { max-width: 1400px; margin: 0 auto; padding: 0 16px 40px; }
        .ce-toolbar {
            display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
            padding: 10px 16px; margin: 16px 0 0;
            background: var(--surface-bg); border: 1px solid var(--surface-border); border-radius: 10px;
        }
        .ce-toolbar select, .ce-toolbar button {
            padding: 7px 14px; border-radius: 6px; font-size: 13px;
            border: 1px solid var(--surface-border); background: var(--bg);
            color: var(--text-primary); cursor: pointer;
        }
        .ce-toolbar button:hover, .ce-toolbar button.active {
            background: var(--accent); color: #fff; border-color: var(--accent);
        }
        .ce-toolbar .ce-gap { flex: 1; }

        .ce-main { margin-top: 12px; border: 1px solid var(--surface-border); border-radius: 10px; overflow: hidden; }

        .ce-editor-wrap { display: flex; min-height: 500px; }
        .ce-editor-pane { flex: 1; min-width: 0; position: relative; }
        .ce-editor-pane .pane-label {
            position: absolute; top: 0; left: 0; right: 0; z-index: 10;
            padding: 6px 14px; font-size: 12px; font-weight: 600;
            background: var(--bg); color: var(--text-secondary);
            border-bottom: 1px solid var(--surface-border);
        }
        .ce-editor-container { width: 100%; height: 500px; padding-top: 34px; }

        .ce-diff-wrap { display: none; }
        .ce-diff-wrap.active { display: flex; }
        .ce-editor-wrap:not(.active) { display: none; }

        /* 文件操作栏 */
        .ce-filebar {
            display: flex; gap: 8px; align-items: center; padding: 8px 0; flex-wrap: wrap;
        }
        .ce-filebar input[type="file"] { display: none; }
        .ce-filebar label {
            padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
            border: 1px solid var(--surface-border); background: var(--bg);
            color: var(--text-primary); transition: all .15s;
        }
        .ce-filebar label:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

        @media (max-width: 900px) {
            .ce-editor-wrap { flex-direction: column; }
            .ce-editor-pane { min-height: 300px; }
        }
    </style>
</head>
<body>
    <script>(function(){var t=localStorage.getItem('devtools-theme')||'dark';document.body.className='theme-'+t;})()</script>
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="ce-app">
        <div class="ce-toolbar">
            <select id="ce-lang" onchange="changeLanguage()">
                <option value="javascript">JavaScript</option>
                <option value="typescript">TypeScript</option>
                <option value="python">Python</option>
                <option value="java">Java</option>
                <option value="go">Go</option>
                <option value="rust">Rust</option>
                <option value="cpp">C++</option>
                <option value="csharp">C#</option>
                <option value="sql">SQL</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="json">JSON</option>
                <option value="xml">XML</option>
                <option value="yaml">YAML</option>
                <option value="markdown">Markdown</option>
                <option value="shell">Shell</option>
                <option value="php">PHP</option>
                <option value="ruby">Ruby</option>
                <option value="swift">Swift</option>
                <option value="kotlin">Kotlin</option>
            </select>
            <button id="ce-btn-editor" class="active" onclick="switchMode('editor')">📝 编辑器</button>
            <button id="ce-btn-diff" onclick="switchMode('diff')">🔄 代码对比</button>
            <span class="ce-gap"></span>
            <span class="ce-filebar">
                <label for="ce-file-open">📂 打开文件</label>
                <input type="file" id="ce-file-open" onchange="openFile()">
                <label onclick="saveFile()">💾 保存</label>
                <label onclick="copyAll()">📋 复制</label>
                <label onclick="formatCode()">✨ 格式化</label>
            </span>
        </div>

        <!-- 编辑器模式 -->
        <div class="ce-main">
            <div class="ce-editor-wrap active" id="ce-editor-mode">
                <div class="ce-editor-pane">
                    <div class="pane-label" id="ce-editor-label">📝 代码编辑器</div>
                    <div class="ce-editor-container" id="ce-editor"></div>
                </div>
            </div>

            <!-- Diff 模式 -->
            <div class="ce-diff-wrap" id="ce-diff-mode">
                <div class="ce-editor-pane" style="border-right:1px solid var(--surface-border)">
                    <div class="pane-label">📄 原始版本</div>
                    <div class="ce-editor-container" id="ce-diff-left"></div>
                </div>
                <div class="ce-editor-pane">
                    <div class="pane-label">📝 修改版本</div>
                    <div class="ce-editor-container" id="ce-diff-right"></div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>

<!-- Monaco Editor Loader -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52/min/vs/loader.js"></script>
<script>
var editor = null, diffEditor = null;
var currentMode = 'editor';

// 语言映射
var langMap = {
    'javascript': 'javascript', 'typescript': 'typescript', 'python': 'python',
    'java': 'java', 'go': 'go', 'rust': 'rust', 'cpp': 'cpp', 'csharp': 'csharp',
    'sql': 'sql', 'html': 'html', 'css': 'css', 'json': 'json', 'xml': 'xml',
    'yaml': 'yaml', 'markdown': 'markdown', 'shell': 'shell', 'php': 'php',
    'ruby': 'ruby', 'swift': 'swift', 'kotlin': 'kotlin'
};

require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52/min/vs' } });

var demoCode = {};
demoCode['javascript'] = '// JavaScript 示例\nfunction fibonacci(n) {\n  if (n <= 1) return n;\n  return fibonacci(n - 1) + fibonacci(n - 2);\n}\n\nconsole.log(fibonacci(10)); // 55';
demoCode['python'] = '# Python 示例\ndef quick_sort(arr):\n    if len(arr) <= 1:\n        return arr\n    pivot = arr[0]\n    left = [x for x in arr[1:] if x <= pivot]\n    right = [x for x in arr[1:] if x > pivot]\n    return quick_sort(left) + [pivot] + quick_sort(right)\n\nprint(quick_sort([3,6,8,10,1,2,1]))';
demoCode['go'] = '// Go 示例\npackage main\n\nimport "fmt"\n\nfunc main() {\n    nums := []int{2, 7, 11, 15}\n    target := 9\n    fmt.Println(twoSum(nums, target))\n}\n\nfunc twoSum(nums []int, target int) []int {\n    m := make(map[int]int)\n    for i, v := range nums {\n        if j, ok := m[target-v]; ok {\n            return []int{j, i}\n        }\n        m[v] = i\n    }\n    return nil\n}';
demoCode['sql'] = '-- SQL 示例\nSELECT \n    u.name AS 用户名,\n    COUNT(o.id) AS 订单数,\n    SUM(o.total) AS 总消费\nFROM users u\nLEFT JOIN orders o ON u.id = o.user_id\nWHERE o.created_at >= DATE_SUB(NOW(), INTERVAL 30 DAY)\nGROUP BY u.id, u.name\nHAVING COUNT(o.id) > 0\nORDER BY 总消费 DESC;';
demoCode['json'] = '{\n  "name": "DevTools Station",\n  "version": "2.0.0",\n  "tools": [\n    {"id": 1, "name": "MD5 加密", "category": "crypto"},\n    {"id": 2, "name": "JSON 格式化", "category": "format"}\n  ],\n  "author": {"name": "Admin", "email": "admin@example.com"}\n}';
demoCode['html'] = '<!DOCTYPE html>\n<html lang="zh-CN">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>示例页面</title>\n</head>\n<body>\n    <h1>Hello, DevTools!</h1>\n    <p>这是一个 HTML 示例。</p>\n</body>\n</html>';
demoCode['css'] = '/* CSS 示例 */\n:root {\n  --primary: #6366f1;\n  --bg: #ffffff;\n  --text: #1f2937;\n}\n\n.card {\n  background: var(--bg);\n  border-radius: 12px;\n  padding: 24px;\n  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);\n  transition: transform 0.2s ease;\n}\n\n.card:hover {\n  transform: translateY(-2px);\n}';

require(['vs/editor/editor.main'], function() {
    createEditor();
});

function createEditor() {
    var lang = document.getElementById('ce-lang').value;
    var monacoLang = langMap[lang] || 'plaintext';
    var code = demoCode[lang] || '';

    editor = monaco.editor.create(document.getElementById('ce-editor'), {
        value: code,
        language: monacoLang,
        theme: isDarkTheme() ? 'vs-dark' : 'vs',
        fontSize: 14,
        lineNumbers: 'on',
        minimap: { enabled: true },
        automaticLayout: true,
        scrollBeyondLastLine: false,
        tabSize: 2,
        wordWrap: 'on',
        bracketPairColorization: { enabled: true },
        suggest: { showWords: true }
    });
}

function createDiffEditor() {
    var lang = document.getElementById('ce-lang').value;
    var monacoLang = langMap[lang] || 'plaintext';

    diffEditor = monaco.editor.createDiffEditor(document.getElementById('ce-diff-right'), {
        theme: isDarkTheme() ? 'vs-dark' : 'vs',
        fontSize: 14,
        automaticLayout: true,
        minimap: { enabled: false },
        scrollBeyondLastLine: false,
        renderSideBySide: window.innerWidth > 900
    });

    diffEditor.setModel({
        original: monaco.editor.createModel('// 原始代码（粘贴到这里）', monacoLang),
        modified: monaco.editor.createModel('// 修改后代码（粘贴到这里）', monacoLang)
    });
}

function switchMode(mode) {
    currentMode = mode;
    document.getElementById('ce-editor-mode').classList.toggle('active', mode === 'editor');
    document.getElementById('ce-diff-mode').classList.toggle('active', mode === 'diff');
    document.getElementById('ce-btn-editor').classList.toggle('active', mode === 'editor');
    document.getElementById('ce-btn-diff').classList.toggle('active', mode === 'diff');

    if (mode === 'diff' && !diffEditor) {
        createDiffEditor();
    }
    if (mode === 'diff' && diffEditor) {
        diffEditor.layout();
    }
    if (mode === 'editor' && editor) {
        editor.layout();
    }
}

function changeLanguage() {
    var lang = document.getElementById('ce-lang').value;
    var monacoLang = langMap[lang] || 'plaintext';
    if (editor) {
        var model = editor.getModel();
        monaco.editor.setModelLanguage(model, monacoLang);
    }
    if (diffEditor) {
        var origModel = diffEditor.getOriginalEditor().getModel();
        var modModel = diffEditor.getModifiedEditor().getModel();
        if (origModel) monaco.editor.setModelLanguage(origModel, monacoLang);
        if (modModel) monaco.editor.setModelLanguage(modModel, monacoLang);
    }
}

function openFile() {
    var file = document.getElementById('ce-file-open').files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
        if (editor) editor.setValue(e.target.result);
        var ext = file.name.split('.').pop().toLowerCase();
        for (var k in langMap) {
            if (langMap[k] === ext || k === ext) {
                document.getElementById('ce-lang').value = k;
                changeLanguage();
                break;
            }
        }
    };
    reader.readAsText(file);
}

function saveFile() {
    var content = editor ? editor.getValue() : '';
    if (!content.trim()) { alert('没有内容'); return; }
    var ext = document.getElementById('ce-lang').value;
    var exts = {javascript:'js', typescript:'ts', python:'py', java:'java', go:'go', rust:'rs', cpp:'cpp', csharp:'cs', sql:'sql', html:'html', css:'css', json:'json', xml:'xml', yaml:'yaml', markdown:'md', shell:'sh', php:'php', ruby:'rb', swift:'swift', kotlin:'kt'};
    var fext = exts[ext] || 'txt';
    var blob = new Blob([content], {type:'text/plain'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'code.' + fext;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
}

function copyAll() {
    var content = editor ? editor.getValue() : '';
    if (!content) return;
    navigator.clipboard.writeText(content).then(function() {
        var btn = event.target;
        var orig = btn.textContent;
        btn.textContent = '✅ 已复制!';
        setTimeout(function() { btn.textContent = orig; }, 1500);
    }).catch(function() { alert('复制失败'); });
}

function formatCode() {
    if (editor) {
        editor.getAction('editor.action.formatDocument').run();
    }
}

function isDarkTheme() {
    var cls = document.documentElement.className;
    return cls.indexOf('dark') > -1 || cls.indexOf('theme-dark') > -1;
}

// 监听主题切换
var themeObs = new MutationObserver(function() {
    var dark = isDarkTheme();
    var theme = dark ? 'vs-dark' : 'vs';
    if (editor) monaco.editor.setTheme(theme);
    if (diffEditor) monaco.editor.setTheme(theme);
});
themeObs.observe(document.documentElement, {attributes: true, attributeFilter: ['class']});

// 快捷键
document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        if (currentMode === 'editor') formatCode();
    }
});

// 窗口大小变化时重新布局
window.addEventListener('resize', function() {
    if (editor) editor.layout();
    if (diffEditor) diffEditor.layout();
});
</script>
</body>
</html>
