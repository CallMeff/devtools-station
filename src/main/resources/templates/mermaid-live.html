<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tool.name} + ' - DevTools Station'">Mermaid 图表编辑器 - DevTools Station</title>
    <meta name="description" th:content="${tool.description}">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script>(function(){var t=localStorage.getItem('devtools-theme');if(t){document.documentElement.className='theme-'+t;}})()</script>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg-primary,#1a1a2e);color:var(--text-primary,#ddd);min-height:100vh;display:flex;flex-direction:column}
        .topbar{display:flex;align-items:center;gap:10px;padding:6px 14px;background:var(--bg-secondary,#1e1e2e);border-bottom:1px solid var(--border-color,#333);min-height:42px;flex-shrink:0}
        .topbar .brand{display:flex;align-items:center;gap:8px;margin-right:auto}
        .topbar .brand a{color:var(--accent,#7c3aed);text-decoration:none;font-size:18px;font-weight:bold}
        .topbar .brand .sep{color:var(--text-muted,#888);margin:0 4px}
        .topbar .brand .tool-name{color:var(--text-primary,#ddd);font-size:14px}
        .topbar button{padding:5px 12px;border:1px solid var(--border-color,#444);border-radius:6px;background:var(--bg-tertiary,#2a2a3a);color:var(--text-primary,#ddd);cursor:pointer;font-size:13px;transition:all .15s}
        .topbar button:hover{background:var(--accent,#7c3aed);border-color:var(--accent,#7c3aed);color:#fff}
        .page-content{flex:1;display:flex;max-width:1600px;margin:0 auto;width:100%;padding:16px;gap:16px;height:calc(100vh - 42px)}
        @media (max-width:900px){.page-content{flex-direction:column;height:auto}}

        .editor-panel{flex:1;display:flex;flex-direction:column;gap:10px;min-width:300px}
        .preview-panel{flex:1;display:flex;flex-direction:column;gap:10px;min-width:300px}
        .panel-header{display:flex;align-items:center;justify-content:space-between;gap:8px}
        .panel-label{font-size:12px;font-weight:600;color:var(--text-muted,#888);text-transform:uppercase;letter-spacing:.5px}
        .toolbar{display:flex;gap:6px;flex-wrap:wrap}
        .btn-sm{padding:4px 10px;border:1px solid var(--border-color,#444);border-radius:6px;background:var(--bg-tertiary,#2a2a3a);color:var(--text-primary,#ddd);cursor:pointer;font-size:12px;transition:all .15s;white-space:nowrap}
        .btn-sm:hover{background:var(--accent,#7c3aed);border-color:var(--accent,#7c3aed);color:#fff}
        .btn-sm.active{background:var(--accent,#7c3aed);border-color:var(--accent,#7c3aed);color:#fff}
        .btn-accent{padding:4px 10px;border-radius:6px;background:var(--accent,#7c3aed);border:1px solid var(--accent,#7c3aed);color:#fff;cursor:pointer;font-size:12px;transition:all .15s;white-space:nowrap}
        .btn-accent:hover{opacity:.85}
        textarea.code-area{flex:1;padding:14px;border:1px solid var(--border-color,#444);border-radius:10px;background:var(--bg-secondary,#1e1e2e);color:var(--text-primary,#ddd);font-family:'SF Mono','JetBrains Mono','Consolas',monospace;font-size:14px;line-height:1.6;outline:none;resize:none;min-height:200px;tab-size:2}
        textarea.code-area:focus{border-color:var(--accent,#7c3aed)}
        .preview-box{flex:1;padding:20px;border:1px solid var(--border-color,#444);border-radius:10px;background:var(--bg-secondary,#1e1e2e);overflow:auto;display:flex;align-items:flex-start;justify-content:center;min-height:200px}
        .preview-box .mermaid{width:100%;display:flex;justify-content:center}
        .preview-box .mermaid svg{max-width:100%;height:auto}
        .error-msg{color:#ff6b6b;font-size:13px;padding:10px 14px;background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);border-radius:8px;display:none;word-break:break-all}
        .error-msg:not(:empty){display:block}
        .success-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:8px 20px;background:var(--accent,#7c3aed);color:#fff;border-radius:8px;font-size:13px;z-index:999;animation:fadeInUp .3s;pointer-events:none}
        @keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    </style>
</head>
<body>
<div class="topbar">
    <div class="brand">
        <a href="/">DevTools Station</a>
        <span class="sep">/</span>
        <span class="tool-name" th:text="${tool.name}">Mermaid 图表编辑器</span>
    </div>
    <button onclick="downloadSVG()" title="导出 SVG">📥 导出SVG</button>
    <button onclick="copyMarkdown()" title="复制 Mermaid 代码">📋 复制代码</button>
    <button onclick="shareLink()" title="分享链接">🔗 分享</button>
</div>
<div class="page-content">
    <div class="editor-panel">
        <div class="panel-header">
            <span class="panel-label">Mermaid 代码</span>
            <div class="toolbar">
                <button class="btn-sm" onclick="insertTemplate('flowchart')" title="流程图">流程图</button>
                <button class="btn-sm" onclick="insertTemplate('sequence')" title="时序图">时序图</button>
                <button class="btn-sm" onclick="insertTemplate('class')" title="类图">类图</button>
                <button class="btn-sm" onclick="insertTemplate('er')" title="ER图">ER图</button>
                <button class="btn-sm" onclick="insertTemplate('gantt')" title="甘特图">甘特图</button>
                <button class="btn-sm" onclick="insertTemplate('pie')" title="饼图">饼图</button>
                <button class="btn-sm" onclick="insertTemplate('git')" title="Git图">Git图</button>
                <button class="btn-sm" onclick="insertTemplate('mindmap')" title="思维导图">思维导图</button>
            </div>
        </div>
        <textarea id="mermaidInput" class="code-area" spellcheck="false" placeholder="输入 Mermaid 语法……">flowchart TD
    A[开始] --> B{是否登录?}
    B -->|是| C[显示主页]
    B -->|否| D[跳转登录页]
    C --> E[加载数据]
    E --> F[渲染页面]
    D --> G[输入账号密码]
    G --> H{验证通过?}
    H -->|是| C
    H -->|否| G</textarea>
        <div class="error-msg" id="errorMsg"></div>
    </div>
    <div class="preview-panel">
        <div class="panel-header">
            <span class="panel-label">实时预览</span>
            <div class="toolbar">
                <button class="btn-sm" onclick="zoomIn()" title="放大">🔍+</button>
                <button class="btn-sm" onclick="zoomOut()" title="缩小">🔍-</button>
                <button class="btn-sm" onclick="zoomReset()" title="重置">1:1</button>
            </div>
        </div>
        <div class="preview-box" id="previewBox">
            <div class="mermaid" id="mermaidPreview"></div>
        </div>
    </div>
</div>
<div id="toast" class="success-toast" style="display:none"></div>
<script>
(function(){
    var theme = localStorage.getItem('devtools-theme') || 'default';
    var mermaidTheme = theme === 'light' ? 'default' : 'dark';
    mermaid.initialize({startOnLoad:false,theme:mermaidTheme,securityLevel:'loose',fontFamily:'-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Microsoft YaHei,sans-serif'});

    var input = document.getElementById('mermaidInput');
    var preview = document.getElementById('mermaidPreview');
    var errorEl = document.getElementById('errorMsg');
    var currentZoom = 1;
    var renderTimer = null;

    // Load from URL hash
    if(location.hash && location.hash.length > 1){
        try{input.value = decodeURIComponent(atob(location.hash.slice(1)));}catch(e){}
    }
    // Or localStorage
    if(!location.hash || location.hash.length <= 1){
        var saved = localStorage.getItem('mermaid-last-code');
        if(saved) input.value = saved;
    }

    function render(){
        clearTimeout(renderTimer);
        renderTimer = setTimeout(function(){
            var code = input.value.trim();
            if(!code){preview.innerHTML='<p style="color:var(--text-muted,#888);font-size:14px">在左侧输入 Mermaid 语法，实时预览图表</p>';errorEl.textContent='';return;}
            var id = 'mermaid-' + Date.now();
            preview.innerHTML = '<div class="mermaid" id="' + id + '"></div>';
            // insert code into div as text
            var el = document.getElementById(id);
            // Use textContent to avoid HTML injection
            var codeEl = document.createElement('div');
            codeEl.textContent = code;
            el.innerHTML = '';
            el.appendChild(codeEl);
            // Need to insert as raw text - mermaid needs text
            el.textContent = code;
            try {
                mermaid.run({nodes:[el]}).then(function(){
                    errorEl.textContent = '';
                    preview.querySelector('svg') && preview.querySelector('svg').setAttribute('style','max-width:100%;height:auto;transform:scale('+currentZoom+');transform-origin:top center');
                    localStorage.setItem('mermaid-last-code', input.value);
                }).catch(function(err){
                    errorEl.textContent = '语法错误: ' + (err.message || err);
                    preview.innerHTML = '<p style="color:var(--text-muted,#888);font-size:14px">⚠️ 图表渲染失败，请检查语法</p>';
                });
            } catch(e) {
                errorEl.textContent = '语法错误: ' + (e.message || e);
            }
        }, 400);
    }

    input.addEventListener('input', render);

    // Templates
    window.insertTemplate = function(type){
        var tpls = {
            flowchart: 'flowchart TD\n    A[开始] --> B{判断条件}\n    B -->|条件1| C[执行操作1]\n    B -->|条件2| D[执行操作2]\n    C --> E[结束]\n    D --> E',
            sequence: 'sequenceDiagram\n    participant U as 用户\n    participant F as 前端\n    participant B as 后端\n    participant D as 数据库\n    U->>F: 点击登录\n    F->>B: POST /api/login\n    B->>D: 查询用户\n    D-->>B: 返回用户数据\n    B-->>F: 返回 token\n    F-->>U: 登录成功',
            class: 'classDiagram\n    class User {\n        +String id\n        +String name\n        +String email\n        +login()\n        +logout()\n    }\n    class Order {\n        +String id\n        +Date createdAt\n        +Float total\n        +submit()\n    }\n    User "1" --> "*" Order : 拥有',
            er: 'erDiagram\n    USER ||--o{ ORDER : 下单\n    ORDER ||--|{ ORDER_ITEM : 包含\n    PRODUCT ||--o{ ORDER_ITEM : 属于\n    USER {\n        int id PK\n        string name\n        string email\n    }\n    ORDER {\n        int id PK\n        date created_at\n        float total\n    }\n    PRODUCT {\n        int id PK\n        string name\n        float price\n    }',
            gantt: 'gantt\n    title 项目开发计划\n    dateFormat  YYYY-MM-DD\n    section 需求阶段\n    需求分析     :a1, 2026-01-01, 7d\n    需求评审     :after a1, 3d\n    section 开发阶段\n    前端开发     :2026-01-11, 14d\n    后端开发     :2026-01-11, 14d\n    section 测试阶段\n    集成测试     :2026-01-25, 7d\n    上线发布     :2026-02-01, 2d',
            pie: 'pie title 编程语言使用分布\n    "JavaScript" : 35\n    "Python" : 25\n    "Java" : 18\n    "Go" : 12\n    "Rust" : 10',
            git: 'gitGraph\n    commit id: "初始化项目"\n    branch develop\n    checkout develop\n    commit id: "添加登录功能"\n    commit id: "修复登录bug"\n    checkout main\n    merge develop tag: "v1.0"\n    branch feature/api\n    checkout feature/api\n    commit id: "实现API接口"\n    commit id: "添加单元测试"\n    checkout main\n    merge feature/api tag: "v1.1"',
            mindmap: 'mindmap\n  root((项目架构))\n    前端\n      React\n      TypeScript\n      Tailwind CSS\n    后端\n      Spring Boot\n      MyBatis Plus\n      MySQL\n    基础设施\n      Docker\n      Nginx\n      Redis'
        };
        input.value = tpls[type] || tpls.flowchart;
        input.focus();
        render();
    };

    window.downloadSVG = function(){
        var svg = preview.querySelector('svg');
        if(!svg){showToast('请先确保图表渲染成功');return;}
        var clone = svg.cloneNode(true);
        var data = new XMLSerializer().serializeToString(clone);
        var blob = new Blob(['<?xml version="1.0" encoding="UTF-8"?>\n'+data],{type:'image/svg+xml'});
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');a.href=url;a.download='mermaid-diagram.svg';a.click();
        URL.revokeObjectURL(url);showToast('SVG 已下载');
    };

    window.copyMarkdown = function(){
        var text = input.value;
        if(!text.trim()){showToast('没有内容可复制');return;}
        navigator.clipboard.writeText(text).then(function(){showToast('已复制到剪贴板')}).catch(function(){showToast('复制失败，请手动选择')});
    };

    window.shareLink = function(){
        var text = input.value;
        if(!text.trim()){showToast('没有内容可分享');return;}
        var encoded = btoa(unescape(encodeURIComponent(text)));
        var url = location.origin + location.pathname + '#' + encoded;
        navigator.clipboard.writeText(url).then(function(){showToast('分享链接已复制到剪贴板')}).catch(function(){showToast('分享失败')});
    };

    window.zoomIn = function(){currentZoom=Math.min(currentZoom+0.2,3);applyZoom()};
    window.zoomOut = function(){currentZoom=Math.max(currentZoom-0.2,0.4);applyZoom()};
    window.zoomReset = function(){currentZoom=1;applyZoom()};

    function applyZoom(){
        var svg = preview.querySelector('svg');
        if(svg){svg.style.transform='scale('+currentZoom+')';svg.style.transformOrigin='top center'}
    }

    function showToast(msg){
        var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
        setTimeout(function(){t.style.display='none'},1800);
    }

    window.addEventListener('theme:change',function(){
        var t = localStorage.getItem('devtools-theme')||'default';
        mermaid.initialize({startOnLoad:false,theme:t==='light'?'default':'dark',securityLevel:'loose'});
        render();
    });

    render();
})();
</script>
</body>
</html>
