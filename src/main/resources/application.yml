---
# H2 便携版配置（免 MySQL，数据存本地文件 devtools.mv.db）
spring:
  config:
    activate:
      on-profile: portable
  datasource:
    url: jdbc:h2:file:./data/devtools;MODE=MySQL;DB_CLOSE_DELAY=-1;AUTO_RECONNECT=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      continue-on-error: true
      encoding: UTF-8
  mail:
    host: smtp.qq.com
    port: 465
    username: your-email@qq.com
    password: your-smtp-auth-code
    protocol: smtps
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
            required: true
